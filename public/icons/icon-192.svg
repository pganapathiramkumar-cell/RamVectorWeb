<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="192" height="192" rx="40" fill="url(#accent)" opacity="0.08"/>
  <!-- "Rv" text -->
  <text x="96" y="118" font-family="Inter,Arial,sans-serif" font-size="76" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="-4" opacity="0.95">Rv</text>
  <!-- Orange accent bar -->
  <rect x="60" y="148" width="72" height="6" rx="3" fill="url(#accent)"/>
</svg>
